<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Name</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxygen:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
          :root {
            --bg:      #f6f1e8;
            --surface: #fffaf2;
            --accent:  #c26d3a;
            --text:    #2f241f;
            --radius:  16px;
            --font:    &quot;Oxygen&quot;, sans-serif;
            --border: #d4b99a;
          }
          *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 5rem 1.5rem 4rem;
      }

      main {
        width: 100%;
        max-width: 860px;
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }

      /* --- Profile --- */

      .profile {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        padding-bottom: 2rem;
        border-bottom: 1px solid var(--border, color-mix(in srgb, var(--text) 10%, transparent));
      }

      /* --- Two-column layout --- */

      .columns {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 2rem;
        align-items: start;
        position: relative;
      }

      .columns::after {
        content: '';
        position: absolute;
        top: 0;
        bottom: 0;
        left: calc(100% / 3);
        transform: translateX(-50%);
        width: 1px;
        background: var(--border, color-mix(in srgb, var(--text) 10%, transparent));
      }

      @media (max-width: 640px) {
        .columns {
          grid-template-columns: 1fr;
        }

        .columns::after {
          display: none;
        }
      }

      .avatar {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 0.25rem;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .bio {
        font-size: 0.95rem;
        opacity: 0.6;
        text-align: center;
        max-width: 360px;
        line-height: 1.5;
      }

      /* --- Links --- */

      .links {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      /* Center links if there are no posts */
      .links:only-child {
        grid-column: 1 / -1;
        max-width: 320px;
        width: 100%;
        margin: 0 auto;
      }

      .link-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.625rem;
        width: 100%;
        padding: 0.875rem 1.25rem;
        background: var(--surface);
        color: var(--text);
        text-decoration: none;
        border-radius: var(--radius);
        font-size: 0.95rem;
        font-weight: 600;
        border: 1px solid var(--border, transparent);
        transition:
          background 0.15s ease,
          transform 0.1s ease,
          box-shadow 0.15s ease;
      }

      .link-btn:hover {
        background: var(--accent);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px var(--border, transparent);
      }

      .link-btn .icon {
        display: flex;
        align-items: center;
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }

      .link-btn .icon svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }

      /* --- Posts --- */

      .posts {
      }

      .posts-heading {
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        opacity: 0.4;
        margin-bottom: 0.75rem;
      }

      .post-card {
        display: block;
        padding: 0.875rem 1rem;
        background: var(--surface);
        border-radius: var(--radius);
        text-decoration: none;
        color: var(--text);
        margin-bottom: 0.5rem;
        border: 1px solid var(--border, transparent);
        transition: background 0.15s ease, box-shadow 0.15s ease;
      }

      .post-card:hover {
        background: color-mix(in srgb, var(--accent) 25%, var(--surface));
        box-shadow: 0 4px 12px var(--border, transparent);
      }

      .post-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 1rem;
      }

      .post-title {
        font-weight: 600;
        font-size: 0.95rem;
      }

      .post-date {
        font-size: 0.8rem;
        opacity: 0.45;
        flex-shrink: 0;
      }

      .post-excerpt {
        font-size: 0.875rem;
        opacity: 0.6;
        margin-top: 0.375rem;
        line-height: 1.5;
      }

      /* --- Post article page --- */

      article {
        max-width: 680px;
        width: 100%;
      }

      .back {
        display: inline-flex;
        align-items: center;
        gap: 0.375rem;
        color: var(--text);
        text-decoration: none;
        opacity: 0.55;
        font-size: 0.875rem;
        margin-bottom: 2rem;
        transition: opacity 0.15s ease;
      }

      .back:hover {
        opacity: 1;
      }

      .post-meta {
        font-size: 0.875rem;
        opacity: 0.45;
        margin-top: 0.375rem;
        margin-bottom: 2.5rem;
      }

      .content {
        line-height: 1.8;
        font-size: 1rem;
      }

      .content h2,
      .content h3 {
        margin: 2rem 0 0.75rem;
        letter-spacing: -0.01em;
      }

      .content p {
        margin-bottom: 1.25rem;
      }

      .content a {
        color: var(--accent);
        text-underline-offset: 3px;
      }

      .content code {
        background: var(--surface);
        padding: 0.15em 0.4em;
        border-radius: 4px;
        font-size: 0.875em;
      }

      .content pre {
        background: var(--surface);
        padding: 1.25rem;
        border-radius: var(--radius);
        overflow-x: auto;
        margin-bottom: 1.25rem;
      }

      .content pre code {
        background: none;
        padding: 0;
        font-size: 0.875rem;
      }

      .content blockquote {
        border-left: 3px solid var(--accent);
        padding-left: 1rem;
        opacity: 0.75;
        margin: 1.25rem 0;
      }

      .content ul,
      .content ol {
        padding-left: 1.5rem;
        margin-bottom: 1.25rem;
      }

      .content li {
        margin-bottom: 0.25rem;
      }

      .content img {
        max-width: 100%;
        border-radius: var(--radius);
        margin: 1rem 0;
      }
    </style>
  </head>
  <body>
    <main>
      <header class="profile">
        <h1>Your Name</h1>
        <p class="bio">Building things on the internet.</p>

        </nav>

        <section class="posts">
          <p class="posts-heading">Posts</p>
          <a class="post-card" href="posts/hello-world.html">
            <div class="post-header">
              <span class="post-title">Hello, World</span>
              <span class="post-date">March 18, 2026</span>

      </div>
    </main>
  </body>
</html>
